<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="내 노트">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>내 노트</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --accent:#1D9E75;--accent-d:#085041;--accent-l:#E1F5EE;
  --bg:#ffffff;--bg2:#f5f5f4;--bg3:#eeede9;
  --ink:#1c1c1a;--ink2:#57564f;--ink3:#9b9a93;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --danger:#E24B4A;--danger-l:rgba(226,75,74,0.1);
  --shadow:0 2px 12px rgba(0,0,0,0.08);
  --r:8px;--rl:14px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --ink:#f2f2f0;--ink2:#aeaeb2;--ink3:#636366;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
  --accent-l:rgba(29,158,117,0.2);--accent-d:#9FE1CB;
  --shadow:0 2px 12px rgba(0,0,0,0.4);
}}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard','Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);font-size:16px}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
.screen{display:none;flex-direction:column;height:100%;overflow:hidden}
.screen.active{display:flex}

/* ── LIST SCREEN ── */
/* Background */
#list-screen{background:#F7F6F2}
@media(prefers-color-scheme:dark){#list-screen{background:#161614}}

/* Header */
.list-hdr{
  padding:calc(var(--safe-top) + 16px) 20px 14px;
  background:var(--accent);
  position:sticky;top:0;z-index:20;
}
.hdr-date{font-size:12px;font-weight:600;color:rgba(255,255,255,.65);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.hdr-main-row{display:flex;align-items:center;gap:10px}
.app-title{font-size:26px;font-weight:800;flex:1;color:#fff;letter-spacing:-0.8px;line-height:1.1}
.hdr-badge{background:rgba(255,255,255,.22);color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px}
.hdr-icon-btn{width:36px;height:36px;border:none;border-radius:50%;background:rgba(255,255,255,.18);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background .15s;color:#fff}
.hdr-icon-btn:active{background:rgba(255,255,255,.32)}

/* Search – always visible, below header */
.search-wrap{padding:12px 16px 10px;background:var(--accent)}
.search-box{position:relative}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;color:var(--ink3);pointer-events:none}
.search-inp{width:100%;height:40px;border:none;border-radius:22px;background:#fff;padding:0 14px 0 38px;font-size:14px;font-family:inherit;color:var(--ink);outline:none;box-shadow:0 2px 10px rgba(0,0,0,.12)}
@media(prefers-color-scheme:dark){.search-inp{background:#2c2c2e;color:var(--ink)}}
.search-inp::placeholder{color:var(--ink3)}

/* Notebook pills row */
.nb-strip{display:flex;align-items:center;gap:0;background:var(--bg, #fff);border-bottom:0.5px solid var(--border)}
@media(prefers-color-scheme:dark){.nb-strip{background:#1c1c1e}}
.nb-pills{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;flex:1;scrollbar-width:none}
.nb-pills::-webkit-scrollbar{display:none}
.nb-pill{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;border:none;cursor:pointer;white-space:nowrap;transition:all .18s;flex-shrink:0;background:transparent;color:var(--ink3)}
.nb-pill.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(29,158,117,.3)}
.nb-manage-btn{flex-shrink:0;border:none;background:none;cursor:pointer;padding:0 14px;color:var(--ink3);font-size:17px;border-left:0.5px solid var(--border);transition:color .15s;display:flex;align-items:center}
.nb-manage-btn:active{color:var(--accent)}

/* Tag pills */
.tag-bar{display:flex;gap:6px;padding:8px 14px;overflow-x:auto;scrollbar-width:none;background:var(--bg)}
@media(prefers-color-scheme:dark){.tag-bar{background:#1c1c1e}}
.tag-bar::-webkit-scrollbar{display:none}
.tag-pill{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border2);background:var(--bg);color:var(--ink2);cursor:pointer;white-space:nowrap;transition:all .15s}
.tag-pill.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* Sort strip */
.sort-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 16px;border-bottom:0.5px solid var(--border);background:var(--bg)}
@media(prefers-color-scheme:dark){.sort-bar{background:#1c1c1e}}
.sort-info{font-size:11px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.04em}
.sort-select{font-size:12px;border:none;background:transparent;color:var(--ink3);cursor:pointer;font-family:inherit;outline:none;font-weight:500}

/* Note list & cards */
.note-list{flex:1;overflow-y:auto;padding:12px 14px 90px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch;background:#F7F6F2}
@media(prefers-color-scheme:dark){.note-list{background:#161614}}

.note-card{background:#fff;border-radius:16px;padding:0;cursor:pointer;transition:transform .15s;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05)}
@media(prefers-color-scheme:dark){.note-card{background:#2c2c2e;box-shadow:none;border:0.5px solid rgba(255,255,255,.08)}}
.note-card:active{transform:scale(.985)}
.note-card.pinned .nc-body{border-top:3px solid var(--accent)}

/* Left-accent stripe per notebook (color set by JS via data-color) */
.nc-stripe{height:4px;border-radius:0}

.nc-body{padding:14px 16px 0}
.nc-title{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.2px}
.nc-preview{font-size:13px;color:var(--ink2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.6}

.nc-meta{display:flex;align-items:center;gap:6px;padding:10px 16px 0;flex-wrap:wrap}
.nc-nb{font-size:11px;color:var(--ink3);font-weight:500}
.nc-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--accent-l);color:var(--accent-d);font-weight:600}
.nc-date{font-size:11px;color:var(--ink3);margin-left:auto}

.nc-actions{display:flex;align-items:center;gap:6px;padding:10px 12px 12px}
.nc-act{height:32px;border:none;border-radius:10px;background:#F7F6F2;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--ink2);transition:all .15s;gap:5px;padding:0 12px;font-family:inherit;font-weight:600}
@media(prefers-color-scheme:dark){.nc-act{background:#3a3a3c}}
.nc-act.edit{color:var(--accent);background:var(--accent-l);flex:1}
.nc-act.edit:active{opacity:.75}
.nc-act.icon-only{width:32px;padding:0;flex:none;color:var(--ink3)}
.nc-act.icon-only:active{color:var(--danger);background:var(--danger-l)}

/* Empty state */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:40px;background:#F7F6F2}
@media(prefers-color-scheme:dark){.empty{background:#161614}}
.empty-art{width:80px;height:80px;border-radius:24px;background:var(--accent-l);display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:6px}
.empty-title{font-size:18px;font-weight:700;color:var(--ink2);letter-spacing:-0.3px}
.empty-sub{font-size:14px;color:var(--ink3);line-height:1.65;max-width:240px}
.empty-btn{margin-top:10px;padding:13px 28px;border-radius:14px;background:var(--accent);color:#fff;border:none;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 3px 12px rgba(29,158,117,.35)}

/* FAB */
.fab{position:fixed;bottom:calc(var(--safe-bot) + 22px);right:20px;width:58px;height:58px;border-radius:50%;background:var(--accent);color:#fff;border:none;box-shadow:0 6px 24px rgba(29,158,117,.45);cursor:pointer;font-size:26px;display:flex;align-items:center;justify-content:center;z-index:30;transition:transform .15s,box-shadow .15s}
.fab:active{transform:scale(.9);box-shadow:0 3px 12px rgba(29,158,117,.35)}

/* EDITOR */
.editor-hdr{padding:calc(var(--safe-top) + 8px) 12px 8px;background:var(--bg);border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px;z-index:20}
.back-btn{display:flex;align-items:center;gap:2px;font-size:15px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:inherit;padding:6px 4px;font-weight:500}
.nb-chip{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--border);font-size:12px;color:var(--ink2);cursor:pointer;font-family:inherit}
.editor-actions{display:flex;gap:6px;margin-left:auto}
.e-btn{width:34px;height:34px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink2);font-size:17px;transition:all .15s}
.e-btn.save-btn{background:var(--accent);border-color:var(--accent);color:#fff}
.meta-strip{display:flex;align-items:center;gap:10px;padding:6px 16px;background:var(--bg2);border-bottom:0.5px solid var(--border);font-size:11px;color:var(--ink3)}
.meta-saved.dirty{color:var(--accent)}
.editor-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;-webkit-overflow-scrolling:touch}
.title-input{font-size:22px;font-weight:700;border:none;outline:none;background:transparent;color:var(--ink);font-family:inherit;padding:16px 16px 8px;letter-spacing:-0.3px}
.title-input::placeholder{color:var(--ink3)}
.toolbar{display:flex;align-items:center;gap:2px;padding:8px 10px;border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border);background:var(--bg);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.toolbar::-webkit-scrollbar{display:none}
.tb{width:34px;height:34px;border:none;background:transparent;border-radius:var(--r);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--ink2);transition:background .1s;flex-shrink:0}
.tb:hover,.tb:active{background:var(--bg2);color:var(--ink)}
.tb-sep{width:1px;height:20px;background:var(--border2);margin:0 3px;flex-shrink:0}
.content-edit{flex:1;outline:none;padding:12px 16px 100px;font-size:16px;line-height:1.8;color:var(--ink);background:transparent;caret-color:var(--accent);min-height:300px}
.content-edit:empty::before{content:'내용을 입력하세요...';color:var(--ink3);pointer-events:none}
.content-edit h2{font-size:19px;font-weight:700;margin:16px 0 6px}
.content-edit h3{font-size:16px;font-weight:600;margin:12px 0 4px}
.content-edit blockquote{border-left:3px solid var(--accent);padding-left:14px;color:var(--ink2);margin:10px 0;font-style:italic}
.content-edit ul,.content-edit ol{padding-left:22px;margin:6px 0}
.content-edit li{margin:3px 0}
.content-edit hr{border:none;border-top:1.5px solid var(--border2);margin:16px 0}
.content-edit code{background:var(--bg2);border-radius:4px;padding:1px 5px;font-size:13px;font-family:monospace}
.tag-row{display:flex;align-items:center;gap:8px;padding:10px 16px;border-top:0.5px solid var(--border);background:var(--bg);flex-wrap:wrap;flex-shrink:0}
.cur-tags{display:flex;gap:5px;flex-wrap:wrap}
.cur-tag{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;background:var(--accent-l);color:var(--accent-d)}
.cur-tag-del{border:none;background:none;cursor:pointer;color:var(--accent-d);font-size:13px;padding:0;line-height:1;display:flex;align-items:center}
.tag-inp{font-size:12px;border:1.5px solid var(--border2);border-radius:20px;padding:3px 10px;background:var(--bg2);color:var(--ink);outline:none;width:85px;font-family:inherit;transition:border-color .2s}
.tag-inp:focus{border-color:var(--accent)}
.tag-inp::placeholder{color:var(--ink3)}
.pin-btn{display:flex;align-items:center;gap:4px;font-size:12px;padding:3px 10px;border-radius:20px;border:1.5px solid var(--border2);background:var(--bg2);color:var(--ink3);cursor:pointer;margin-left:auto;font-family:inherit;transition:all .15s}
.pin-btn.on{background:var(--accent-l);border-color:var(--accent);color:var(--accent-d)}

/* BOTTOM SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:50;display:none;align-items:flex-end}
.overlay.show{display:flex}
.sheet{width:100%;max-width:480px;margin:0 auto;background:var(--bg);border-radius:20px 20px 0 0;padding:0 0 calc(var(--safe-bot) + 8px);max-height:82vh;overflow-y:auto}
.sheet-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 4px}
.sheet-hdr{display:flex;align-items:center;padding:10px 20px 10px;border-bottom:0.5px solid var(--border)}
.sheet-hdr-title{font-size:17px;font-weight:600;flex:1}
.sheet-hdr-close{border:none;background:none;cursor:pointer;font-size:22px;color:var(--ink3);padding:0 0 0 8px;line-height:1}
.sheet-item{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;font-size:15px;transition:background .1s;border:none;background:none;width:100%;font-family:inherit;color:var(--ink);text-align:left}
.sheet-item:hover,.sheet-item:active{background:var(--bg2)}
.sheet-item.on{color:var(--accent);font-weight:600}
.sheet-item-icon{font-size:20px;width:32px;text-align:center;flex-shrink:0}

/* Notebook manage */
.nb-manage-list{padding:4px 0}
.nb-row{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:0.5px solid var(--border)}
.nb-row-icon{font-size:22px;width:32px;text-align:center;flex-shrink:0}
.nb-row-name{font-size:15px;font-weight:500;flex:1}
.nb-row-count{font-size:12px;color:var(--ink3);background:var(--bg2);border-radius:10px;padding:2px 8px}
.nb-row-del{border:none;background:none;cursor:pointer;font-size:18px;color:var(--ink3);padding:6px;border-radius:var(--r);transition:all .15s;display:flex;align-items:center;line-height:1}
.nb-row-del:hover:not(:disabled){color:var(--danger);background:var(--danger-l)}
.nb-row-del:disabled{opacity:.2;cursor:not-allowed}

/* Add notebook */
.nb-add-area{padding:16px 20px}
.nb-add-label{font-size:11px;font-weight:700;color:var(--ink3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.nb-add-row{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.nb-add-inp{flex:1;height:40px;border:1.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);padding:0 12px;font-size:14px;font-family:inherit;color:var(--ink);outline:none;transition:border-color .2s}
.nb-add-inp:focus{border-color:var(--accent)}
.nb-add-inp::placeholder{color:var(--ink3)}
.nb-add-btn{height:40px;padding:0 18px;border-radius:var(--r);background:var(--accent);color:#fff;border:none;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.nb-add-btn:disabled{opacity:.35;cursor:not-allowed}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px}
.emoji-opt{font-size:22px;border:2px solid transparent;border-radius:var(--r);background:none;cursor:pointer;padding:4px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;transition:all .15s}
.emoji-opt:hover{background:var(--bg2)}
.emoji-opt.on{border-color:var(--accent);background:var(--accent-l)}

/* TOAST / CONFIRM */
.toast{position:fixed;bottom:calc(var(--safe-bot) + 100px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--ink);color:var(--bg);padding:10px 20px;border-radius:var(--rl);font-size:14px;font-weight:500;opacity:0;transition:all .25s;z-index:100;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.confirm-overlay.show{display:flex}
.confirm-box{background:var(--bg);border-radius:var(--rl);padding:24px;width:100%;max-width:300px;box-shadow:var(--shadow)}
.confirm-title{font-size:17px;font-weight:600;margin-bottom:8px}
.confirm-msg{font-size:14px;color:var(--ink2);line-height:1.55;margin-bottom:20px}
.confirm-btns{display:flex;gap:10px}
.cbtn{flex:1;padding:12px;border:none;border-radius:var(--r);font-family:inherit;font-size:15px;font-weight:600;cursor:pointer}
.cbtn:active{opacity:.7}
.cbtn.cancel{background:var(--bg2);color:var(--ink2)}
.cbtn.danger{background:var(--danger);color:#fff}
</style>
</head>
<body>
<div id="app">

<!-- LIST SCREEN -->
<div class="screen active" id="list-screen">
  <!-- Header -->
  <div class="list-hdr">
    <div class="hdr-date" id="hdr-date"></div>
    <div class="hdr-main-row">
      <span class="app-title">내 노트</span>
      <span class="hdr-badge" id="hdr-badge">0</span>
      <button class="hdr-icon-btn" id="nb-manage-open-btn" aria-label="분류 관리" title="분류 관리">⚙️</button>
    </div>
  </div>
  <!-- Search bar -->
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input class="search-inp" id="search-inp" placeholder="제목, 내용, 태그 검색..." autocomplete="off" aria-label="검색">
    </div>
  </div>
  <!-- Notebook pills -->
  <div class="nb-strip">
    <div class="nb-pills" id="nb-tabs" role="tablist"></div>
    <button class="nb-manage-btn" id="nb-manage-open-btn2" aria-label="분류 관리" title="분류 관리">＋</button>
  </div>
  <!-- Tag bar -->
  <div class="tag-bar" id="tag-bar" style="display:none"></div>
  <!-- Sort strip -->
  <div class="sort-bar">
    <span class="sort-info" id="sort-info">0개</span>
    <select class="sort-select" id="sort-select">
      <option value="updated">최근 수정순</option>
      <option value="created" selected>작성일순</option>
      <option value="title">제목순</option>
    </select>
  </div>
  <!-- Note list -->
  <div class="note-list" id="note-list"></div>
  <button class="fab" id="fab-btn" aria-label="새 노트">✏️</button>
</div>

<!-- EDITOR SCREEN -->
<div class="screen" id="editor-screen">
  <div class="editor-hdr">
    <button class="back-btn" id="back-btn">◀ 노트</button>
    <button class="nb-chip" id="nb-chip-btn">📓 기본</button>
    <div class="editor-actions">
      <button class="e-btn" id="pin-hdr-btn">📌</button>
      <button class="e-btn save-btn" id="save-btn">저장</button>
    </div>
  </div>
  <div class="meta-strip">
    <span class="meta-saved" id="meta-saved">저장됨</span>
    <span id="meta-wc" style="margin-left:auto"></span>
  </div>
  <div class="editor-body">
    <input class="title-input" id="title-inp" placeholder="제목" maxlength="100">
    <div class="toolbar">
      <button class="tb" data-c="bold">𝐁</button>
      <button class="tb" data-c="italic">𝑰</button>
      <button class="tb" data-c="underline" style="text-decoration:underline">U</button>
      <button class="tb" data-c="strikeThrough" style="text-decoration:line-through">S</button>
      <div class="tb-sep"></div>
      <button class="tb" data-c="h2">H2</button>
      <button class="tb" data-c="h3">H3</button>
      <div class="tb-sep"></div>
      <button class="tb" data-c="insertUnorderedList">•≡</button>
      <button class="tb" data-c="insertOrderedList">1≡</button>
      <button class="tb" data-c="blockquote">❝</button>
      <div class="tb-sep"></div>
      <button class="tb" data-c="hr">—</button>
      <button class="tb" data-c="code">&lt;/&gt;</button>
      <div class="tb-sep"></div>
      <button class="tb" data-c="undo">↩</button>
      <button class="tb" data-c="redo">↪</button>
    </div>
    <div class="content-edit" id="content-edit" contenteditable="true" spellcheck="true"></div>
  </div>
  <div class="tag-row">
    <span style="font-size:16px;color:var(--ink3)">🏷</span>
    <div class="cur-tags" id="cur-tags"></div>
    <input class="tag-inp" id="tag-inp" placeholder="+ 태그" maxlength="20">
    <button class="pin-btn" id="pin-row-btn">📌 고정</button>
  </div>
</div>

<!-- NOTEBOOK PICKER (에디터) -->
<div class="overlay" id="nb-pick-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <span class="sheet-hdr-title">분류 선택</span>
      <button class="sheet-hdr-close" id="nb-pick-close">×</button>
    </div>
    <div id="nb-pick-items"></div>
  </div>
</div>

<!-- NOTEBOOK MANAGE (목록) -->
<div class="overlay" id="nb-manage-overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr">
      <span class="sheet-hdr-title">분류 관리</span>
      <button class="sheet-hdr-close" id="nb-manage-close">×</button>
    </div>
    <div class="nb-manage-list" id="nb-manage-list"></div>
    <div class="nb-add-area">
      <div class="nb-add-label">새 분류 추가</div>
      <div class="nb-add-row">
        <input class="nb-add-inp" id="nb-add-inp" placeholder="분류 이름 입력..." maxlength="12">
        <button class="nb-add-btn" id="nb-add-btn" disabled>추가</button>
      </div>
      <div class="nb-add-label" style="margin-bottom:8px">아이콘 선택</div>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirm-title">삭제</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-btns">
      <button class="cbtn cancel" id="confirm-cancel">취소</button>
      <button class="cbtn danger" id="confirm-ok">삭제</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SK_NOTES = 'MyNoteMemo/notes';
const SK_NBS   = 'MyNoteMemo/notebooks';
const DEFAULT_NBS = [
  {name:'기본',icon:'📓',locked:true},
  {name:'업무',icon:'💼',locked:false},
  {name:'개인',icon:'🏠',locked:false},
  {name:'아이디어',icon:'💡',locked:false},
  {name:'독서',icon:'📚',locked:false},
  {name:'여행',icon:'✈️',locked:false}
];
const EMOJIS = ['📓','📔','📒','📕','📗','📘','📙','📁','💼','🏠','💡','📚','✈️','🎯','🎨','💪','🌿','🔬','💰','❤️','⭐','🎵','🍜','🏋️','📝','🗂️','🗒️','🔖','🛒','🧠','🎮','🌍','🏆','🤝','💻','📷'];

let notebooks=[], notes=[], curId=null, search='', curNb='전체', curTag=null, sortBy='created';
let autoTimer=null, pendingAction=null, selectedEmoji='📁';

function load(){
  try{const r=localStorage.getItem(SK_NOTES);if(r)notes=JSON.parse(r);}catch(e){}
  if(!Array.isArray(notes))notes=[];
  try{const r=localStorage.getItem(SK_NBS);if(r)notebooks=JSON.parse(r);}catch(e){}
  if(!Array.isArray(notebooks)||!notebooks.length)notebooks=DEFAULT_NBS.map(n=>({...n}));
  if(!notebooks.find(n=>n.name==='기본'))notebooks.unshift({name:'기본',icon:'📓',locked:true});
  notebooks.forEach(n=>{if(n.name==='기본')n.locked=true;});
}
function saveNotes(){try{localStorage.setItem(SK_NOTES,JSON.stringify(notes));}catch(e){}}
function saveNotebooks(){try{localStorage.setItem(SK_NBS,JSON.stringify(notebooks));}catch(e){}}
function nbIcon(name){const nb=notebooks.find(n=>n.name===name);return nb?nb.icon:'📁';}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function fmt(ts){
  const d=new Date(ts),n=new Date(),diff=n-d;
  if(diff<60000)return '방금 전';
  if(diff<3600000)return Math.floor(diff/60000)+'분 전';
  if(diff<86400000)return Math.floor(diff/3600000)+'시간 전';
  if(d.toDateString()===new Date(n-86400000).toDateString())return '어제';
  if(diff<604800000)return Math.floor(diff/86400000)+'일 전';
  return d.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
}
function strip(h){const d=document.createElement('div');d.innerHTML=h;return d.textContent||'';}
function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function wc(html){const t=strip(html).trim();return t?t.replace(/\s+/g,' ').split(' ').length:0;}

function filtered(){
  const q=search.trim().toLowerCase();
  return notes.filter(n=>{
    if(curNb!=='전체'&&n.nb!==curNb)return false;
    if(curTag&&!(n.tags||[]).includes(curTag))return false;
    if(q){const ok=n.title.toLowerCase().includes(q)||strip(n.content||'').toLowerCase().includes(q)||(n.tags||[]).some(t=>t.toLowerCase().includes(q));if(!ok)return false;}
    return true;
  }).sort((a,b)=>{
    if(a.pinned&&!b.pinned)return -1;if(!a.pinned&&b.pinned)return 1;
    if(sortBy==='title')return(a.title||'').localeCompare(b.title||'','ko');
    if(sortBy==='created')return b.created-a.created;
    return b.updated-a.updated;
  });
}
function allTags(){const s=new Set();notes.forEach(n=>(n.tags||[]).forEach(t=>s.add(t)));return[...s];}

function renderList(){
  renderNbTabs();renderTagBar();
  const arr=filtered();
  document.getElementById('sort-info').textContent=arr.length+'개';
  const list=document.getElementById('note-list');
  if(!arr.length){
    list.innerHTML=`<div class="empty">
      <div class="empty-art">${search||curTag?'🔍':'📝'}</div>
      <div class="empty-title">${search||curTag?'검색 결과 없음':'아직 노트가 없어요'}</div>
      <div class="empty-sub">${search||curTag?'다른 키워드로 다시 검색해보세요.':'첫 번째 노트를 작성해
소중한 생각을 기록해보세요.'}</div>
      ${!search&&!curTag?'<button class="empty-btn" onclick="newNote()">✏️ 첫 노트 쓰기</button>':''}
    </div>`;return;
  }
  list.innerHTML='';
  arr.forEach(n=>{
    const card=document.createElement('div');
    card.className='note-card'+(n.pinned?' pinned':'');
    card.setAttribute('tabindex','0');card.setAttribute('role','button');
    const prev=strip(n.content||'').replace(/\s+/g,' ').trim().slice(0,100);
    const tags=(n.tags||[]).slice(0,3).map(t=>`<span class="nc-tag">#${esc(t)}</span>`).join('');
    const stripeColor=nbColor(n.nb||'기본');
    card.innerHTML=`<div class="nc-stripe" style="background:${stripeColor}"></div>
    <div class="nc-body">
      <div class="nc-title">${esc(n.title)||'제목 없음'}</div>
      ${prev?`<div class="nc-preview">${esc(prev)}</div>`:''}
    </div>
    <div class="nc-meta">
      <span class="nc-nb">${nbIcon(n.nb||'기본')} ${esc(n.nb||'기본')}</span>
      ${tags}
      <span class="nc-date">${fmt(n.created)}</span>
    </div>
    <div class="nc-actions">
      <button class="nc-act edit" data-act="edit">✏️ 수정하기</button>
      <button class="nc-act icon-only" data-act="pin" title="${n.pinned?'고정 해제':'고정'}">${n.pinned?'📍':'📌'}</button>
      <button class="nc-act icon-only" data-act="del" title="삭제">🗑</button>
    </div>`;
    card.querySelector('[data-act=del]').onclick=e=>{e.stopPropagation();confirmDel('note',n.id);};
    card.querySelector('[data-act=pin]').onclick=e=>{e.stopPropagation();togglePin(n.id);};
    card.querySelector('[data-act=edit]').onclick=e=>{e.stopPropagation();openEditor(n.id);};
    card.onkeydown=e=>{if(e.key==='Enter'||e.key===' ')openEditor(n.id);};
    list.appendChild(card);
  });
}

function renderNbTabs(){
  const bar=document.getElementById('nb-tabs');bar.innerHTML='';
  const mkPill=(label,nb)=>{
    const btn=document.createElement('button');
    btn.className='nb-pill'+(curNb===nb?' active':'');
    btn.setAttribute('role','tab');btn.textContent=label;
    btn.onclick=()=>{curNb=nb;curTag=null;renderList();};
    bar.appendChild(btn);
  };
  mkPill('전체',  '전체');
  notebooks.forEach(nb=>{
    const cnt=notes.filter(n=>n.nb===nb.name).length;
    mkPill(nb.icon+' '+nb.name+(cnt?' '+cnt:''),nb.name);
  });
}

function renderTagBar(){
  const bar=document.getElementById('tag-bar');const tags=allTags();
  bar.style.display=tags.length?'flex':'none';if(!tags.length)return;
  bar.innerHTML='';
  const all=document.createElement('button');all.className='tag-pill'+(curTag?'':' on');all.textContent='전체';
  all.onclick=()=>{curTag=null;renderList();};bar.appendChild(all);
  tags.forEach(t=>{
    const el=document.createElement('button');el.className='tag-pill'+(curTag===t?' on':'');el.textContent='#'+t;
    el.onclick=()=>{curTag=curTag===t?null:t;renderList();};bar.appendChild(el);
  });
}

/* NOTEBOOK MANAGE */
function openNbManageSheet(){
  renderNbManageList();renderEmojiGrid();
  document.getElementById('nb-manage-overlay').classList.add('show');
}
function closeNbManageSheet(){
  document.getElementById('nb-manage-overlay').classList.remove('show');
  document.getElementById('nb-add-inp').value='';
  document.getElementById('nb-add-btn').disabled=true;
  selectedEmoji='📁';renderEmojiGrid();
}
function renderNbManageList(){
  const list=document.getElementById('nb-manage-list');list.innerHTML='';
  notebooks.forEach(nb=>{
    const cnt=notes.filter(n=>n.nb===nb.name).length;
    const row=document.createElement('div');row.className='nb-row';
    row.innerHTML=`<span class="nb-row-icon">${nb.icon}</span>
      <span class="nb-row-name">${esc(nb.name)}</span>
      <span class="nb-row-count">${cnt}개</span>
      <button class="nb-row-del"${nb.locked?' disabled title="기본 분류는 삭제 불가"':''}>🗑</button>`;
    if(!nb.locked)row.querySelector('.nb-row-del').onclick=()=>confirmDel('nb',nb.name,cnt);
    list.appendChild(row);
  });
}
function renderEmojiGrid(){
  const grid=document.getElementById('emoji-grid');grid.innerHTML='';
  EMOJIS.forEach(e=>{
    const btn=document.createElement('button');
    btn.className='emoji-opt'+(selectedEmoji===e?' on':'');btn.textContent=e;
    btn.onclick=()=>{selectedEmoji=e;renderEmojiGrid();};grid.appendChild(btn);
  });
}
function addNotebook(){
  const name=document.getElementById('nb-add-inp').value.trim();if(!name)return;
  if(notebooks.find(n=>n.name===name)){showToast('이미 있는 이름입니다');return;}
  notebooks.push({name,icon:selectedEmoji,locked:false});
  saveNotebooks();renderNbManageList();
  document.getElementById('nb-add-inp').value='';document.getElementById('nb-add-btn').disabled=true;
  const icon=selectedEmoji;selectedEmoji='📁';renderEmojiGrid();
  renderList();showToast(icon+' '+name+' 분류 추가됨');
}
function deleteNotebook(name){
  notes.forEach(n=>{if(n.nb===name)n.nb='기본';});saveNotes();
  notebooks=notebooks.filter(n=>n.name!==name);saveNotebooks();
  if(curNb===name)curNb='전체';
  renderNbManageList();renderList();showToast('분류 삭제됨');
}

/* NOTEBOOK PICKER (에디터) */
function openNbPickSheet(){
  const items=document.getElementById('nb-pick-items');items.innerHTML='';
  const curN=notes.find(x=>x.id===curId);
  notebooks.forEach(nb=>{
    const btn=document.createElement('button');
    btn.className='sheet-item'+(curN&&curN.nb===nb.name?' on':'');
    btn.innerHTML=`<span class="sheet-item-icon">${nb.icon}</span>${esc(nb.name)}`;
    btn.onclick=()=>{
      if(curN){curN.nb=nb.name;curN.updated=Date.now();saveNotes();}
      document.getElementById('nb-chip-btn').textContent=nb.icon+' '+nb.name;
      closeNbPickSheet();markDirty();
    };
    items.appendChild(btn);
  });
  document.getElementById('nb-pick-overlay').classList.add('show');
}
function closeNbPickSheet(){document.getElementById('nb-pick-overlay').classList.remove('show');}

/* NOTES */
function confirmDel(type,idOrName,cnt){
  pendingAction={type,idOrName,cnt};
  if(type==='note'){
    document.getElementById('confirm-title').textContent='노트 삭제';
    document.getElementById('confirm-msg').textContent='이 노트를 삭제하시겠습니까? 되돌릴 수 없습니다.';
  } else {
    const c=cnt||0;
    document.getElementById('confirm-title').textContent='분류 삭제';
    document.getElementById('confirm-msg').textContent=c>0
      ?`'${idOrName}' 분류를 삭제하면 노트 ${c}개가 '기본'으로 이동합니다. 계속하시겠습니까?`
      :`'${idOrName}' 분류를 삭제하시겠습니까?`;
  }
  document.getElementById('confirm-overlay').classList.add('show');
}
function execConfirm(){
  if(!pendingAction)return;
  if(pendingAction.type==='note')deleteNote(pendingAction.idOrName);
  if(pendingAction.type==='nb')deleteNotebook(pendingAction.idOrName);
  pendingAction=null;
}
function deleteNote(id){
  notes=notes.filter(n=>n.id!==id);saveNotes();renderList();showToast('노트 삭제됨');
  if(curId===id)showScreen('list-screen');
}
function togglePin(id){
  const n=notes.find(x=>x.id===id);if(!n)return;
  n.pinned=!n.pinned;n.updated=Date.now();saveNotes();renderList();
  if(curId===id)updatePinUI(n.pinned);
  showToast(n.pinned?'📌 상단 고정':'고정 해제');
}
function newNote(){
  const defNb=curNb==='전체'?'기본':curNb;
  const n={id:genId(),title:'',content:'',tags:[],nb:defNb,pinned:false,created:Date.now(),updated:Date.now()};
  notes.unshift(n);saveNotes();openEditor(n.id);
}

/* EDITOR */
function openEditor(id){
  curId=id;const n=notes.find(x=>x.id===id);if(!n)return;
  document.getElementById('title-inp').value=n.title||'';
  document.getElementById('content-edit').innerHTML=n.content||'';
  const nb=notebooks.find(x=>x.name===n.nb)||notebooks[0];
  document.getElementById('nb-chip-btn').textContent=nb.icon+' '+nb.name;
  updatePinUI(n.pinned);renderCurTags(n.tags||[]);updateMetaStrip(n);updateWC();
  showScreen('editor-screen');
  if(!n.title)setTimeout(()=>document.getElementById('title-inp').focus(),200);
}
function updateMetaStrip(n){
  const el=document.getElementById('meta-saved');
  el.textContent='저장됨 · '+fmt(n.updated);el.classList.remove('dirty');
}
function markDirty(){
  const el=document.getElementById('meta-saved');el.textContent='저장 안 됨';el.classList.add('dirty');
}
function updateWC(){
  const w=wc(document.getElementById('content-edit').innerHTML);
  document.getElementById('meta-wc').textContent=w?w+'자':'';
}
function updatePinUI(pinned){
  document.getElementById('pin-hdr-btn').style.opacity=pinned?1:0.4;
  const rb=document.getElementById('pin-row-btn');
  rb.className='pin-btn'+(pinned?' on':'');rb.textContent='📌 '+(pinned?'고정됨':'고정');
}
function renderCurTags(tags){
  const c=document.getElementById('cur-tags');c.innerHTML='';
  tags.forEach(t=>{
    const sp=document.createElement('span');sp.className='cur-tag';
    sp.innerHTML=esc(t)+' <button class="cur-tag-del">×</button>';
    sp.querySelector('button').onclick=()=>removeTag(t);c.appendChild(sp);
  });
}
function removeTag(tag){
  const n=notes.find(x=>x.id===curId);if(!n)return;
  n.tags=(n.tags||[]).filter(t=>t!==tag);renderCurTags(n.tags);autoSave();
}
function addTag(tag){
  const t=tag.trim().replace(/[#,]/g,'').slice(0,20);if(!t)return;
  const n=notes.find(x=>x.id===curId);if(!n)return;
  if(!(n.tags||[]).includes(t)){n.tags=[...(n.tags||[]),t];renderCurTags(n.tags);autoSave();}
}
function saveNote(toast=true){
  if(!curId)return;const n=notes.find(x=>x.id===curId);if(!n)return;
  n.title=document.getElementById('title-inp').value.trim();
  n.content=document.getElementById('content-edit').innerHTML;
  n.updated=Date.now();saveNotes();updateMetaStrip(n);
  if(toast)showToast('저장됨 ✓');
}
function autoSave(){markDirty();clearTimeout(autoTimer);autoTimer=setTimeout(()=>saveNote(false),1500);}

document.querySelectorAll('.tb[data-c]').forEach(btn=>{
  btn.addEventListener('mousedown',e=>{
    e.preventDefault();const c=btn.dataset.c;
    const ed=document.getElementById('content-edit');ed.focus();
    if(c==='h2'||c==='h3')document.execCommand('formatBlock',false,c);
    else if(c==='blockquote')document.execCommand('formatBlock',false,'blockquote');
    else if(c==='hr')document.execCommand('insertHTML',false,'<hr>');
    else if(c==='code'){const sel=window.getSelection();document.execCommand('insertHTML',false,sel&&sel.toString()?`<code>${sel.toString()}</code>`:'<code></code>');}
    else document.execCommand(c,false,null);
  });
});

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='list-screen')renderList();
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);
}

/* EVENTS */
document.getElementById('fab-btn').onclick=newNote;
document.getElementById('back-btn').onclick=()=>{saveNote(false);showScreen('list-screen');};
document.getElementById('save-btn').onclick=()=>saveNote(true);
document.getElementById('nb-chip-btn').onclick=openNbPickSheet;
document.getElementById('nb-pick-close').onclick=closeNbPickSheet;
document.getElementById('nb-pick-overlay').onclick=e=>{if(e.target===e.currentTarget)closeNbPickSheet();};
document.getElementById('pin-hdr-btn').onclick=()=>{if(curId)togglePin(curId);};
document.getElementById('pin-row-btn').onclick=()=>{if(curId)togglePin(curId);};
document.getElementById('nb-manage-open-btn').onclick=openNbManageSheet;
document.getElementById('nb-manage-close').onclick=()=>{closeNbManageSheet();renderList();};
document.getElementById('nb-manage-overlay').onclick=e=>{if(e.target===e.currentTarget){closeNbManageSheet();renderList();}};
document.getElementById('nb-add-inp').oninput=e=>{document.getElementById('nb-add-btn').disabled=!e.target.value.trim();};
document.getElementById('nb-add-inp').onkeydown=e=>{if(e.key==='Enter')addNotebook();};
document.getElementById('nb-add-btn').onclick=addNotebook;
document.getElementById('search-inp').oninput=e=>{search=e.target.value;renderList();};
document.getElementById('sort-select').onchange=e=>{sortBy=e.target.value;renderList();};
document.getElementById('title-inp').oninput=autoSave;
document.getElementById('content-edit').oninput=()=>{autoSave();updateWC();};
document.getElementById('tag-inp').onkeydown=e=>{if(e.key==='Enter'||e.key===','){e.preventDefault();addTag(e.target.value);e.target.value='';}};
document.getElementById('tag-inp').onblur=e=>{if(e.target.value.trim()){addTag(e.target.value);e.target.value='';}};
document.getElementById('confirm-cancel').onclick=()=>{document.getElementById('confirm-overlay').classList.remove('show');pendingAction=null;};
document.getElementById('confirm-ok').onclick=()=>{document.getElementById('confirm-overlay').classList.remove('show');execConfirm();};

let touchX=0;
document.getElementById('editor-screen').addEventListener('touchstart',e=>{touchX=e.touches[0].clientX;},{passive:true});
document.getElementById('editor-screen').addEventListener('touchend',e=>{if(e.changedTouches[0].clientX-touchX>80&&touchX<40){saveNote(false);showScreen('list-screen');}},{passive:true});

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});

// Notebook stripe colors
const NB_COLORS=['#1D9E75','#378ADD','#D85A30','#BA7517','#D4537E','#639922','#7F77DD','#888780'];
function nbColor(name){
  const idx=notebooks.findIndex(n=>n.name===name);
  return NB_COLORS[idx>=0?idx%NB_COLORS.length:0];
}

// Header date
function updateHdrDate(){
  const d=new Date();
  const days=['일','월','화','수','목','금','토'];
  document.getElementById('hdr-date').textContent=
    d.getFullYear()+'년 '+(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+days[d.getDay()]+')';
}

// Wire second manage button
document.getElementById('nb-manage-open-btn2').onclick=openNbManageSheet;
// Update badge on each render
const _origRenderList=renderList;
function renderList(){_origRenderList();
  const b=document.getElementById('hdr-badge');if(b)b.textContent=notes.length;
}

load();updateHdrDate();renderList();
</script>
</body>
</html>
